<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/movie-form.css">
    <title>MovieHub | Movie Form</title>
</head>

<body>

<header>

    <div class="logo">MovieHub</div>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

</header>

<main>

    <div class="form-container">

        <h1> Add / Edit Movie </h1>

        <form>
            <div class="form-group">
                <label>Movie Title</label>

                <input type="text" placeholder="Enter movie title">
            </div>

            <div class="form-group">
                <label>Director</label>

                <input type="text" placeholder="Enter director name">
            </div>

            <div class="form-group">

                <label>Genre</label>

                <select>
                    <option>Select Genre</option>
                    <option>Action</option>
                    <option>Comedy</option>
                    <option>Drama</option>
                    <option>Horror</option>
                    <option>Sci-Fi</option>
                    <option>Adventure</option>
                </select>

            </div>

            <div class="form-group">
                <label>Release Year</label>

                <input type="number" placeholder="Example: 2025">
            </div>

            <div class="form-group">
                <label>Duration (minutes)</label>

                <input type="number" placeholder="Example: 120">
            </div>

            <div class="form-group">
                <label>Description</label>

                <textarea placeholder="Enter movie description"></textarea>
            </div>

            <div class="form-group">
                <label>Poster URL</label>

                <input type="text" placeholder="Enter image URL">
            </div>

            <div class="buttons">
                <button class="save" type="submit">Save Movie</button>

                <button class="cancel" type="button">Cancel</button>
            </div>
        </form>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
