<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/movie-details.css">
    <title>MovieHub | Movie Details</title>
</head>

<body>

<header>

    <div class="logo">MovieHub</div>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

</header>

<main>

    <div class="movie-section">

        <div class="poster">
            <img th:src="${movie.posterUrl}" alt="Movie Poster">
        </div>

        <div class="movie-info">

            <h1 th:text="${movie.title}"></h1>

            <p> <strong>Director:</strong> <span th:text="${movie.director}"></span> </p>

            <p> <strong>Genre:</strong> <span th:text="${movie.genre.displayName}"></span> </p>

            <p> <strong>Release Year:</strong> <span th:text="${movie.releaseYear}"></span> </p>

            <p> <strong>Duration:</strong> <span th:text="${movie.duration}"></span> </p>

            <p class="rating"> ★ <span th:text="${movie.averageRating}"></span>/10 </p>

            <a href="#" class="watch-btn"> + Add to Watchlist </a>

        </div>

    </div>

    <section>

        <h2>Description</h2>

        <div class="description" th:text="${movie.description}"></div>

    </section>


    <section>
        <h2>Reviews</h2>

        <p th:if="${#lists.isEmpty(movie.reviews)}">No reviews yet.</p>

        <div class="review-card" th:each="review : ${movie.reviews}">

            <h3 th:text="${review.reviewer.username}"></h3>

            <p class="review-rating">★ <span th:text="${review.rating}"></span>/10</p>

            <p th:text="${review.content}"></p>

        </div>
    </section>

    <section>
        <h2>Write a Review</h2>

        <div class="review-form">
            <form>
                <label> Rating </label>

                <select>
                    <option>10</option>
                    <option>9</option>
                    <option>8</option>
                    <option>7</option>
                    <option>6</option>
                    <option>5</option>
                    <option>4</option>
                    <option>3</option>
                    <option>2</option>
                    <option>1</option>
                </select>

                <label> Comment </label>

                <textarea placeholder="Write your review..."></textarea>

                <button type="submit"> Submit Review </button>
            </form>
        </div>
    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
