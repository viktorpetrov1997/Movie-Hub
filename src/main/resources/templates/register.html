<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/register.css">
    <title>MovieHub | Register</title>
</head>

<body>

<header>

    <div class="logo">MovieHub</div>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

</header>

<main>

    <div class="register-box">

        <h1> Create Account </h1>

        <form th:action="@{/register}" th:object="${userRegisterRequest}" th:method="post">
            <div class="form-group">
                <label> Username </label>

                <input type="text" th:field="*{username}" placeholder="Choose a username" required>
                <div class="error-message" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="form-group">
                <label> Email </label>

                <input type="email" th:field="*{email}" placeholder="Enter your email" required>
                <div class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="form-group">
                <label> Password </label>

                <input type="password" th:field="*{password}" placeholder="Create a password" required>
                <div class="error-message" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="form-group">
                <label> Confirm Password </label>

                <input type="password" th:field="*{confirmPassword}" placeholder="Confirm your password" required>
                <div class="error-message" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                <div class="error-message" th:if="${#fields.hasErrors('passwordMatching')}" th:errors="*{passwordMatching}"></div>
            </div>

            <button type="submit"> Register </button>
        </form>

        <div class="login-link">
            Already have an account?
            <a href="login.html"> Login here </a>
        </div>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
