<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/watchlist.css">
    <title>MovieHub | My Watchlist</title>
</head>

<body>

<header>

    <div class="logo">MovieHub</div>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

</header>

<main>

    <div class="page-title">
        <h1> My Watchlist </h1>
    </div>

    <section class="watchlist-grid">

        <div class="movie-card">

            <h2> Interstellar </h2>

            <p> Director: Christopher Nolan </p>

            <p> Genre: Sci-Fi </p>

            <p> Added Date: 12/07/2026 </p>

            <div class="status"> PLANNING </div>

            <div class="buttons">
                <button class="update"> Mark as Watched </button>

                <button class="remove"> Remove </button>
            </div>

        </div>

        <div class="movie-card">

            <h2> The Dark Knight </h2>

            <p> Director: Christopher Nolan </p>

            <p> Genre: Action </p>

            <p> Added Date: 05/07/2026 </p>

            <div class="status"> WATCHED </div>

            <div class="buttons">
                <button class="update"> Mark as Watched </button>

                <button class="remove"> Remove </button>
            </div>

        </div>

    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
