<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/login.css">
    <title>MovieHub | Login</title>
</head>

<body>

<header>

    <div class="logo">MovieHub</div>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

</header>

<main>

    <div class="login-box">

        <h1>Login</h1>

        <form th:action="@{/login}" th:object="${userLoginRequest}" th:method="post">
            <div class="form-group">
                <label>Email</label>

                <input type="email" th:field="*{email}" placeholder="Enter your email">
                <div class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>


            <div class="form-group">
                <label>Password</label>

                <input type="password" th:field="*{password}" placeholder="Enter your password">
                <div class="error-message" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>


            <button type="submit">Login</button>
        </form>


        <div class="register-link">

            Don't have an account?

            <a href="register.html">Register here</a>
        </div>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
