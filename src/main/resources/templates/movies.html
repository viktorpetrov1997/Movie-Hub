<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/movies.css">
    <title>MovieHub | Movies</title>
</head>

<body>

<header>

    <div class="logo">MovieHub</div>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

</header>

<main>

    <div class="title">
        <h1>Movie Catalog</h1>
    </div>

    <section class="filters">

        <form th:action="@{/movies}" method="get">
            <input type="text" name="search" placeholder="Search movies..." th:value="${search}">

            <button type="submit">Search</button>
        </form>

    </section>

    <section class="movie-grid">

        <div class="movie-card" th:each="movie : ${movies}">
            <div class="poster">
                <img th:src="${movie.posterUrl}" alt="Movie Poster">
            </div>

            <div class="movie-info">
                <h2 th:text="${movie.title}"></h2>

                <p th:text="'Director: ' + ${movie.director}"></p>

                <p th:text="'Genre: ' + ${movie.genre.displayName}"></p>

                <p th:text="'Year: ' + ${movie.releaseYear}"></p>

                <p class="rating" th:text="'★ ' + ${movie.averageRating} + '/10'"></p>

                <a th:href="@{/movies/{id}(id=${movie.id})}" class="details-btn"> View Details </a>
            </div>
        </div>

    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
